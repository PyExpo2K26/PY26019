<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — FloodGuard India</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9; color: #1a1a2e;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 48px 40px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center; max-width: 420px;
    }
    .code  { font-size: 5rem; font-weight: 700; color: #c0392b; line-height: 1; }
    .title { font-size: 1.25rem; margin: 12px 0 8px; font-weight: 600; }
    .sub   { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .btn   {
      display: inline-block; margin-top: 28px; padding: 12px 28px;
      background: #1E3A5F; color: #fff; border-radius: 8px;
      text-decoration: none; font-size: 0.9rem; font-weight: 500;
    }
    .btn:hover { background: #16304f; }
    .contact { margin-top: 16px; font-size: 0.8rem; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <div class="title">Something went wrong</div>
    <div class="sub">An unexpected error occurred. Our team has been notified.</div>
    <a href="/dashboard" class="btn">Back to dashboard</a>
    <div class="contact">Emergency: Disaster Helpline 1070 &nbsp;|&nbsp; Police 100</div>
  </div>
</body>
</html>
