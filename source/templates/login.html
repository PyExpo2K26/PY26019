<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Flood Prediction System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #edf6ff;
            color: #1e3a5f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Light background radial gradients instead of dark canvas */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 20%,  rgba(186,230,255,0.7) 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 75%,  rgba(147,210,255,0.6) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 100%, rgba(186,230,255,0.5) 0%, transparent 50%),
                linear-gradient(180deg, #dbeeff 0%, #eaf5ff 40%, #f0f9ff 100%);
            pointer-events: none;
        }

        #water-canvas { display: none; }
        .water-shimmer { display: none; }
        .rain-layer    { display: none; }
            position: fixed; inset: 0; z-index: 0;
            width: 100%; height: 100%;
        }

        .water-shimmer {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(180deg,
                rgba(0,30,60,0.55) 0%,
                rgba(0,20,45,0.3)  40%,
                rgba(0,10,30,0.5)  100%
            );
            pointer-events: none;
        }

        /* Rain streaks */
        .rain-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
        .rain-layer::before {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(
                170deg, transparent 0px, transparent 3px,
                rgba(100,200,255,0.04) 3px, rgba(100,200,255,0.04) 4px
            );
            background-size: 8px 60px;
            animation: rain-fall 0.6s linear infinite;
        }
        .rain-layer::after {
            content: ''; position: absolute; inset: 0;
            background-image: repeating-linear-gradient(
                172deg, transparent 0px, transparent 5px,
                rgba(150,220,255,0.025) 5px, rgba(150,220,255,0.025) 6px
            );
            background-size: 14px 80px;
            animation: rain-fall 0.9s linear infinite 0.3s;
        }
        @keyframes rain-fall { from{background-position:0 0} to{background-position:20px 80px} }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(0,180,255,0.12);
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 17px; font-weight: 800; color: #1e3a5f;
            text-decoration: none;
        }
        .nav-brand .drop {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #0369a1, #06b6d4);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 12px rgba(6,182,212,0.4);
        }
        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.28);
            color: #4ade80; padding: 4px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .live-badge::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: #4ade80; animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

        /* PAGE */
        .page {
            position: relative; z-index: 10;
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .login-wrapper {
            width: 100%; max-width: 440px;
            animation: fadeUp 0.6s ease both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

        /* LOGO */
        .logo-area { text-align: center; margin-bottom: 28px; }
        .logo-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #0369a1, #06b6d4);
            border-radius: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 32px; margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(14,165,233,0.3), 0 8px 24px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
        .logo-title {
            font-family: 'Syne', sans-serif;
            font-size: 21px; font-weight: 800; color: #0c3b6e; margin-bottom: 4px;
            text-shadow: 0 2px 12px rgba(6,182,212,0.3);
        }
        .logo-sub { font-size: 13px; color: #4a7fa5; }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.82);
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 22px; padding: 32px;
            box-shadow: 0 0 0 1px rgba(6,182,212,0.06),
                        0 24px 60px rgba(0,0,0,0.6),
                        inset 0 1px 0 rgba(6,182,212,0.1);
            backdrop-filter: blur(22px);
        }
        .card-heading {
            font-family: 'Syne', sans-serif;
            font-size: 20px; font-weight: 700; color: #0c3b6e; margin-bottom: 4px;
        }
        .card-sub { font-size: 13px; color: #4a7fa5; margin-bottom: 26px; }

        /* FIELDS */
        .field { margin-bottom: 16px; }
        .field label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 11px; font-weight: 700; color: #4a7fa5;
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
        }
        .field label a { color: #0369a1; text-decoration: none; font-size: 11px; font-weight: 500; text-transform: none; letter-spacing: 0; transition: color 0.2s; }
        .field label a:hover { color: white; }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%); font-size: 14px; opacity: 0.4; pointer-events: none;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(14,165,233,0.2);
            border-radius: 12px; padding: 13px 14px 13px 40px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; color: white; outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .field input::placeholder { color: #6b9ab8; }
        .field input:focus {
            border-color: rgba(6,182,212,0.55);
            background: rgba(6,182,212,0.1);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.12), 0 0 16px rgba(6,182,212,0.08);
        }
        .toggle-pw {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #6b9ab8; font-size: 15px; padding: 0; transition: color 0.2s;
        }
        .toggle-pw:hover { color: #0369a1; }

        /* REMEMBER */
        .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
        .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #4a7fa5; cursor: pointer; }
        .remember input[type=checkbox] { width: 15px; height: 15px; accent-color: #06b6d4; cursor: pointer; }

        /* BUTTON */
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #0369a1, #0891b2);
            color: white; border: none; border-radius: 12px;
            font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 20px rgba(6,182,212,0.35), 0 0 0 1px rgba(6,182,212,0.2);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .btn-login::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.1) 50%,transparent 100%);
            transform: translateX(-100%); transition: transform 0.5s;
        }
        .btn-login:hover::before { transform: translateX(100%); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(6,182,212,0.5); }
        .btn-login:active { transform: translateY(0); }
        .btn-login.loading { pointer-events: none; opacity: 0.75; }
        .btn-login .btn-text { display: inline; }
        .btn-login .btn-spinner { display: none; }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .btn-spinner { display: inline-flex; align-items: center; gap: 8px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .spinner-ring {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #1e3a5f;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }

        /* ALERT */
        .alert {
            display: none; padding: 12px 14px; border-radius: 10px;
            font-size: 13px; font-weight: 500; margin-bottom: 18px;
            align-items: center; gap: 8px;
        }
        .alert.error   { display:flex; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.28); color:#fca5a5; }
        .alert.success { display:flex; background:rgba(6,182,212,0.1); border:1px solid rgba(6,182,212,0.28); color:#67e8f9; }

        /* DIVIDER */
        .divider { display:flex; align-items:center; gap:12px; margin:0 0 18px; color:#334155; font-size:12px; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(6,182,212,0.1); }

        /* REGISTER */
        .register-row { text-align:center; font-size:13px; color:#64748b; }
        .register-row a { color:#38bdf8; text-decoration:none; font-weight:500; transition:color 0.2s; }
        .register-row a:hover { color:white; }

        /* TRUST */
        .trust-row { display:flex; justify-content:center; gap:24px; margin-top:24px; padding-top:18px; border-top:1px solid rgba(6,182,212,0.1); }
        .trust-item { text-align:center; }
        .trust-val {
            font-family:'Syne',sans-serif; font-size:17px; font-weight:800;
            background:linear-gradient(90deg,#0ea5e9,#06b6d4);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .trust-lbl { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

        /* FOOTER */
        footer { position:relative; z-index:10; text-align:center; font-size:12px; color:#334155; padding:14px 0 20px; }

        /* RIPPLE */
        .ripple {
            position: fixed; z-index: 3; border-radius: 50%;
            border: 1px solid rgba(14,165,233,0.2);
            animation: ripple-expand 2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple-expand { 0%{transform:scale(0);opacity:0.7} 100%{transform:scale(1);opacity:0} }

        @media (max-width:480px) { .card{padding:22px 16px} .trust-row{gap:14px} .nav{padding:0 16px} }
    </style>
</head>
<body>

<canvas id="water-canvas"></canvas>
<div class="water-shimmer"></div>
<div class="rain-layer"></div>

<nav class="nav">
    <a href="/" class="nav-brand">
        <div class="drop">&#128167;</div>
        FloodSense India
    </a>
    <div class="live-badge">System Active</div>
</nav>

<main class="page">
    <div class="login-wrapper">

        <div class="logo-area">
            <div class="logo-icon">&#127754;</div>
            <div class="logo-title">Flood Prediction System</div>
            <div class="logo-sub">AI-Powered Early Warning &middot; India</div>
        </div>

        <div class="card">
            <div class="card-heading">Welcome back</div>
            <div class="card-sub">Sign in to access your dashboard and predictions</div>

            <div class="alert" id="alert"></div>

            <div class="field">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <span class="input-icon">&#9993;</span>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                </div>
            </div>

            <div class="field">
                <label for="password">
                    Password
                    <a href="#" onclick="showForgot(event)">Forgot password?</a>
                </label>
                <div class="input-wrap">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" id="togglePw">&#128065;</button>
                </div>
            </div>

            <div class="row-between">
                <label class="remember">
                    <input type="checkbox" id="remember"> Remember me
                </label>
            </div>

            <button class="btn-login" id="loginBtn" onclick="handleLogin()">
                <span class="btn-text">Sign In &rarr;</span>
                <span class="btn-spinner"><span class="spinner-ring"></span>&nbsp;Signing in&hellip;</span>
            </button>

            <div class="divider">or</div>

            <div class="register-row">
                Don't have an account? <a href="#">Create one free</a>
            </div>

            <div class="trust-row">
                <div class="trust-item"><div class="trust-val">36+</div><div class="trust-lbl">States</div></div>
                <div class="trust-item"><div class="trust-val">700+</div><div class="trust-lbl">Districts</div></div>
                <div class="trust-item"><div class="trust-val">24/7</div><div class="trust-lbl">Live Data</div></div>
                <div class="trust-item"><div class="trust-val">AI</div><div class="trust-lbl">Powered</div></div>
            </div>
        </div>

    </div>
</main>

<footer><p>&copy; 2024 Flood Prediction System | Powered by AI</p></footer>

<script>
/* ═══════════════════════════════════════════════
   REAL WATER FLOW CANVAS
═══════════════════════════════════════════════ */
(function () {
    var canvas = document.getElementById('water-canvas');
    var ctx    = canvas.getContext('2d');
    var W, H, t = 0;

    var waves = [
        { amp:24, freq:0.007, speed:0.016, yRatio:0.54, col:'rgba(2,48,86,0.95)'     },
        { amp:19, freq:0.011, speed:0.024, yRatio:0.57, col:'rgba(3,65,108,0.88)'    },
        { amp:15, freq:0.016, speed:0.033, yRatio:0.60, col:'rgba(4,88,138,0.72)'    },
        { amp:11, freq:0.021, speed:0.042, yRatio:0.62, col:'rgba(5,112,165,0.58)'   },
        { amp:8,  freq:0.027, speed:0.052, yRatio:0.64, col:'rgba(5,140,194,0.42)'   },
        { amp:5,  freq:0.035, speed:0.064, yRatio:0.66, col:'rgba(6,182,212,0.28)'   },
        { amp:3,  freq:0.046, speed:0.078, yRatio:0.68, col:'rgba(103,232,249,0.13)' },
    ];

    var sparks = [], currents = [];

    function mkSpark(x) {
        return {
            x: x != null ? x : Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.42) * 0.55,
            vy: Math.random() * 0.45 + 0.18,
            r:  Math.random() * 1.5 + 0.3,
            a:  Math.random() * 0.45 + 0.08,
            life: 0, max: Math.random() * 200 + 100
        };
    }
    function mkCurrent(fromTop) {
        return {
            x: Math.random() * W,
            y: fromTop ? -10 : Math.random() * H,
            spd: Math.random() * 0.9 + 0.25,
            len: Math.random() * 65 + 28,
            a:   Math.random() * 0.08 + 0.02,
            w:   Math.random() * 0.8 + 0.2,
            drift: (Math.random() - 0.5) * 0.14
        };
    }

    function init() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        sparks   = Array.from({length: 130}, function() { return mkSpark(); });
        currents = Array.from({length: 20},  function() { return mkCurrent(false); });
    }
    window.addEventListener('resize', init);
    init();

    function frame() {
        t++;

        /* deep base */
        var bg = ctx.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,   '#010a16');
        bg.addColorStop(0.28,'#021428');
        bg.addColorStop(0.6, '#022038');
        bg.addColorStop(1,   '#031a2e');
        ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

        /* caustic light blobs */
        for (var c=0;c<6;c++){
            var cx = (Math.sin(t*0.0025+c*1.2)*0.5+0.5)*W;
            var cy = (Math.cos(t*0.0035+c*0.85)*0.5+0.5)*H;
            var rg = ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.16);
            rg.addColorStop(0,'rgba(6,182,212,0.045)');
            rg.addColorStop(0.6,'rgba(6,182,212,0.012)');
            rg.addColorStop(1,'transparent');
            ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
        }

        /* current streaks */
        for (var i=0;i<currents.length;i++){
            var cu=currents[i];
            cu.y+=cu.spd; cu.x+=cu.drift;
            if(cu.y>H+cu.len){ currents[i]=mkCurrent(true); continue; }
            ctx.beginPath();
            ctx.moveTo(cu.x, cu.y);
            ctx.lineTo(cu.x+cu.drift*10, cu.y-cu.len);
            var lg=ctx.createLinearGradient(cu.x,cu.y,cu.x,cu.y-cu.len);
            lg.addColorStop(0,'rgba(6,182,212,0)');
            lg.addColorStop(0.4,'rgba(6,182,212,'+cu.a+')');
            lg.addColorStop(1,'rgba(6,182,212,0)');
            ctx.strokeStyle=lg; ctx.lineWidth=cu.w; ctx.stroke();
        }

        /* waves */
        for (var w=waves.length-1;w>=0;w--){
            var wv=waves[w], bY=H*wv.yRatio;
            ctx.beginPath(); ctx.moveTo(0,H);
            for (var x=0;x<=W;x+=3){
                var y = Math.sin(x*wv.freq + t*wv.speed)*wv.amp
                      + Math.sin(x*wv.freq*1.6 + t*wv.speed*0.75+1.4)*(wv.amp*0.38)
                      + Math.sin(x*wv.freq*0.45+ t*wv.speed*1.25+2.9)*(wv.amp*0.22);
                ctx.lineTo(x, bY+y);
            }
            ctx.lineTo(W,H); ctx.closePath();
            ctx.fillStyle=wv.col; ctx.fill();
        }

        /* surface highlight crest */
        var sv=waves[5];
        ctx.beginPath();
        for (var x=0;x<=W;x+=3){
            var sy=Math.sin(x*sv.freq+t*sv.speed)*sv.amp
                  +Math.sin(x*0.020+t*0.058+2.1)*3.5;
            x===0 ? ctx.moveTo(x,H*sv.yRatio+sy) : ctx.lineTo(x,H*sv.yRatio+sy);
        }
        ctx.strokeStyle='rgba(130,250,255,0.075)'; ctx.lineWidth=2; ctx.stroke();

        /* sparkle foam particles */
        for (var s=0;s<sparks.length;s++){
            var sp=sparks[s];
            sp.x+=sp.vx; sp.y+=sp.vy; sp.life++;
            var p=sp.life/sp.max;
            var a=sp.a*(p<0.2?p/0.2:Math.max(0,1-(p-0.2)/0.8));
            ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2);
            ctx.fillStyle='rgba(180,242,255,'+a+')'; ctx.fill();
            if(sp.life>=sp.max||sp.y>H+5||sp.x<-5||sp.x>W+5) sparks[s]=mkSpark();
        }

        /* auto ripples */
        if (t%75===0) spawnRipple(Math.random()*W, Math.random()*H*0.7+H*0.3);

        requestAnimationFrame(frame);
    }
    frame();

    function spawnRipple(x,y){
        var el=document.createElement('div');
        var sz=Math.random()*110+50;
        el.className='ripple';
        el.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(x-sz/2)+'px;top:'+(y-sz/2)+'px';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},2000);
    }
    document.addEventListener('click',function(e){
        spawnRipple(e.clientX,e.clientY);
        /* extra 2 smaller rings */
        setTimeout(function(){spawnRipple(e.clientX+5,e.clientY+5);},120);
    });
})();

/* ═══════════════════════════════════════════════
   LOGIN LOGIC
═══════════════════════════════════════════════ */
document.getElementById('togglePw').addEventListener('click', function() {
    var pw=document.getElementById('password');
    var show=pw.type==='password';
    pw.type=show?'text':'password';
    this.innerHTML=show?'&#128584;':'&#128065;';
});

function showAlert(msg,type){
    var el=document.getElementById('alert');
    el.className='alert '+type;
    el.innerHTML=(type==='error'?'&#9888; ':'&#10003; ')+msg;
}
function clearAlert(){ document.getElementById('alert').className='alert'; }
function showForgot(e){ e.preventDefault(); showAlert('Password reset link sent to your email.','success'); }
document.querySelectorAll('input').forEach(function(el){ el.addEventListener('input',clearAlert); });

async function handleLogin(){
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('password').value;
    var btn=document.getElementById('loginBtn');
    if(!email||!password){ showAlert('Please enter your email and password.','error'); return; }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showAlert('Please enter a valid email address.','error'); return; }
    btn.classList.add('loading');
    try {
        var res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        var data=await res.json();
        if(res.ok&&data.success){
            showAlert('Login successful! Redirecting&hellip;','success');
            setTimeout(function(){ window.location.href=data.redirect||'/dashboard'; },900);
        } else {
            btn.classList.remove('loading');
            showAlert(data.error||'Invalid email or password.','error');
        }
    } catch(err){
        btn.classList.remove('loading');
        showAlert('Cannot reach server — make sure Flask is running.','error');
    }
}
</script>
</body>
</html>
